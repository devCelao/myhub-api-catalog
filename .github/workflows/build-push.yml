name: "Build & Push Docker Image"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag existente no repositorio (ex: v1.2.0)"
        required: true
        type: string

env:
  DOCKERHUB_IMAGE: api-catalogo
  DOTNET_VERSION: "9.0.x"

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # JOB 1 - Validar tag
  # ════════════════════════════════════════════════════════════════════════
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verificar se a tag existe
        run: |
          if ! git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag '${{ inputs.tag }}' nao existe no repositorio."
            exit 1
          fi
          echo "Tag '${{ inputs.tag }}' encontrada."

  # ════════════════════════════════════════════════════════════════════════
  # JOB 2 - Build e Testes
  # ════════════════════════════════════════════════════════════════════════
  build-test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout do repositorio na tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          path: myhub-api-catalog

      - name: Checkout dos componentes compartilhados
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/myhub-api-all-components
          path: myhub-api-all-components

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore myhub-api-catalog/api-catalog.sln

      - name: Build
        run: dotnet build myhub-api-catalog/api-catalog.sln -c Release --no-restore

      - name: Test com Coverage
        run: |
          dotnet test myhub-api-catalog/CatalogTest/CatalogTest.csproj \
            -c Release --no-build --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings myhub-api-catalog/coverlet.runsettings \
            --results-directory myhub-api-catalog/TestResults

      - name: Gerar relatorio de Coverage
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            "-reports:myhub-api-catalog/TestResults/**/coverage.cobertura.xml" \
            "-targetdir:myhub-api-catalog/CoverageReport" \
            "-reporttypes:HtmlInline_AzurePipelines;TextSummary"

      - name: Publicar resumo de Coverage
        run: |
          cat myhub-api-catalog/CoverageReport/Summary.txt
          echo "## Relatorio de Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat myhub-api-catalog/CoverageReport/Summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload relatorio de Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: myhub-api-catalog/CoverageReport/

  # ════════════════════════════════════════════════════════════════════════
  # JOB 3 - Build e Push para Docker Hub
  # ════════════════════════════════════════════════════════════════════════
  build-push:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout do repositorio na tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          path: myhub-api-catalog

      - name: Checkout dos componentes compartilhados
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/myhub-api-all-components
          path: myhub-api-all-components

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: myhub-api-catalog/CatalogAPI/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE }}:${{ inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE }}:buildcache,mode=max

      - name: Resumo
        run: |
          echo "======================================================"
          echo "  Imagem publicada no Docker Hub"
          echo "======================================================"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE }}:${{ inputs.tag }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE }}:latest"
          echo "======================================================"

# ═══════════════════════════════════════════════════════════════════════════
# SECRETS NECESSARIAS (Settings > Secrets > Actions)
# ═══════════════════════════════════════════════════════════════════════════
# DOCKERHUB_USERNAME  - Usuario Docker Hub
# DOCKERHUB_TOKEN     - Token Docker Hub
# ═══════════════════════════════════════════════════════════════════════════
